<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition>

        <p:dialog id="EventoJudicialCreateDlg" widgetVar="EventoJudicialCreateDialog" modal="true" resizable="false" appendTo="@(body)" header="Crear Evento Judicial Nuevo">
            <h:form id="EventoJudicialCreateForm">
                <h:panelGroup id="display">
                    <div class="botonesapilados" >
                        <p:outputLabel value="Fecha:" for="fecha"  />
                        <p:calendar disabledWeekends="true" mode="inline" required="true" requiredMessage="Fecha es requerido." placeholder="dd/MM/yyyy" autocomplete="off" id="fecha"  pattern="dd/MM/yyyy" value="#{eventoDeCausasJudicialesController.selectedParaEventoJudicialNuevo.fecha}" title="fecha de causa"  />

                        <p:outputLabel value="Tipo de fecha:" for="tipo_de_fecha"  style="margin-top: 10px" />

                        <p:selectOneMenu id="tipo_de_fecha"
                                         value="#{eventoDeCausasJudicialesController.selectedParaEventoJudicialNuevo.tipoDeFecha}"
                                         editable="false"
                                         required="true"
                                        requiredMessage="Debe seleccionar un tipo de fecha"

                                     >
                            <f:selectItem itemLabel=" -- Seleccione un tipo de fecha --" itemValue="" noSelectionOption="true" />
                            <f:selectItem itemLabel="Reclamo administrativo" itemValue="Reclamo administrativo" />
                            <f:selectItem itemLabel="Resolución denegatoria" itemValue="Resolución denegatoria" />
                            <f:selectItem itemLabel="Notificación de Resolución denegatoria" itemValue="Notificación de Resolución denegatoria" />
                            <f:selectItem itemLabel="Presentación de demanda (envío mail)" itemValue="Presentación de demanda (envío mail)" />
                            <f:selectItem itemLabel="Deox notificación de dda" itemValue="Deox notificación de dda" />
                            <f:selectItem itemLabel="Sentencia 1ra instancia" itemValue="Sentencia 1ra instancia" />
                            <f:selectItem itemLabel="Sentencia 2da instancia" itemValue="Sentencia 2da instancia" />
                            <f:selectItem itemLabel="Sentencia REX" itemValue="Sentencia REX" />
                            <f:selectItem itemLabel="Decreto de cumplimiento" itemValue="Decreto de cumplimiento" />
                            <f:selectItem itemLabel="Inicio de ejecución" itemValue="Inicio de ejecución" />
                            <f:selectItem itemLabel="Sentencia de ejecución" itemValue="Sentencia de ejecución" />
                            <f:selectItem itemLabel="Primer embargo" itemValue="Primer embargo" />
                            <f:selectItem itemLabel="Primer transferencia" itemValue="Primer transferencia" />
                            <f:selectItem itemLabel="Primer denuncia cobro" itemValue="Primer denuncia cobro" />
                            <f:selectItem itemLabel="Primer resolución aprobatoria planilla denuncia cobro" itemValue="Primer resolución aprobatoria planilla denuncia cobro" />
                            <f:selectItem itemLabel="Segundo embargo" itemValue="Segundo embargo" />
                            <f:selectItem itemLabel="Segunda transferencia" itemValue="Segunda transferencia" />
                            <f:selectItem itemLabel="Segundo denuncia cobro" itemValue="Segundo denuncia cobro" />
                            <f:selectItem itemLabel="Segunda resolución aprobatoria planilla denuncia cobro" itemValue="Segunda resolución aprobatoria planilla denuncia cobro" />
                            <f:selectItem itemLabel="Tercer embargo" itemValue="Tercer embargo" />
                            <f:selectItem itemLabel="Tercera transferencia" itemValue="Tercera transferencia" />
                            <f:selectItem itemLabel="Cuarto denuncia cobro" itemValue="Cuarto denuncia cobro" />
                            <f:selectItem itemLabel="Tercer resolución aprobatoria planilla denuncia cobro" itemValue="Tercer resolución aprobatoria planilla denuncia cobro" />
                            <f:selectItem itemLabel="Cuarto embargo" itemValue="Cuarto embargo" />
                            <f:selectItem itemLabel="Cuarta transferencia" itemValue="Cuarta transferencia" />
                            <f:selectItem itemLabel="OTRA FECHA JUDICIAL" itemValue="OTRA FECHA JUDICIAL" />
                            <p:ajax listener="#{eventoDeCausasJudicialesController.onTipoDeFechaChange}" update="agendasSentenciaPanel" />
                        </p:selectOneMenu>

                        <h:panelGroup id="agendasSentenciaPanel" layout="block" style="margin-top: 12px;">
                            <ui:repeat value="#{eventoDeCausasJudicialesController.agendasSentenciaPrimeraInstancia}" var="agendaConfig" varStatus="status">
                                <h:panelGroup layout="block" rendered="#{eventoDeCausasJudicialesController.selectedParaEventoJudicialNuevo.tipoDeFecha == 'Sentencia 1ra instancia'}"
                                              style="display:flex; align-items:flex-start; gap:10px; width:100%; margin-bottom:8px; border-bottom:1px solid #e5e5e5; padding:8px 4px; box-sizing:border-box;">

                                    <h:panelGroup layout="block" style="padding-top:5px;">
                                        <p:selectBooleanCheckbox value="#{agendaConfig.seleccionada}" />
                                    </h:panelGroup>

                                    <h:panelGroup layout="block" style="min-width:140px; max-width:160px;">
                                        <p:calendar value="#{agendaConfig.fecha}" pattern="dd/MM/yyyy" navigator="true" disabledWeekends="true" style="width:100%;" />
                                    </h:panelGroup>

                                    <h:panelGroup layout="block" style="min-width:180px; max-width:220px;">
                                        <p:selectOneMenu value="#{agendaConfig.responsable}" filter="true" filterMatchMode="startsWith" style="width:100%;">
                                            <f:selectItem itemLabel="-- Responsable --" itemValue="" noSelectionOption="true"/>
                                            <f:selectItems value="#{empleadoController.itemsAvailableSelectOne}" var="empleado"
                                                           itemLabel="#{empleado.getNombreyApellido()}" itemValue="#{empleado.getNombreyApellido()}" />
                                        </p:selectOneMenu>
                                    </h:panelGroup>

                                    <h:panelGroup layout="block" style="flex:1; min-width:0; padding-top:5px; color:#444; line-height:1.4; word-break:break-word;">
                                        <h:outputText value="#{agendaConfig.descripcion}"/>
                                    </h:panelGroup>

                                </h:panelGroup>
                            </ui:repeat>
                        </h:panelGroup>

                    <p:commandButton actionListener="#{eventoDeCausasJudicialesController.createEventoJudicial(
                                                           eventoDeCausasJudicialesController.selectedParaEventoJudicialNuevo.fecha,
                                                           eventoDeCausasJudicialesController.selectedParaEventoJudicialNuevo.tipoDeFecha ,
                                                           eventoDeCausasJudicialesController.selectedParaEventoJudicialNuevo.orden)}"
                                         class="boton-verde-general" value="#{bundle.Save}" process="@form"
                                         oncomplete="handleSubmit(args,'EventoJudicialCreateDialog');"
                                         update="display,:ExpedienteJudicialEditForm,:growl"/>

                    </div>

                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
