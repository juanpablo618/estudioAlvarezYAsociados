<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title><ui:insert name="title">Estudio Alvarez y Asociados</ui:insert></title>
        <h:outputStylesheet library="css" name="jsfcrud.css"/>
        <h:outputStylesheet library="css" name="styles.css"/>
        <h:outputScript library="js" name="jsfcrud.js"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"></link>
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous"></link>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </h:head>

    <h:body class="app-shell">
        <h:form>
            <p:idleMonitor timeout="1800000">
                <p:ajax event="idle" listener="#{login.onIdle}" update=":growl" />
            </p:idleMonitor>
        </h:form>

        <p:growl id="growl" life="5000" showDetail="true" />

        <p:layout fullPage="true" styleClass="app-layout">
            <p:layoutUnit position="north" styleClass="topbar-container" resizable="false" closable="false" collapsible="false" size="84">
                <div class="topbar">
                    <div class="topbar-brand">
                        <h:graphicImage value="../faces/resources/images/Alvarezyasociados.svg" styleClass="brand-logo"/>
                        <div>
                            <h3>Estudio Alvarez &amp; Asociados</h3>
                            <span>Gestión legal integral</span>
                        </div>
                    </div>

                    <div class="topbar-actions">
                        <p:button outcome="/agenda/Create" value="Nueva Agenda" styleClass="action-btn action-btn-primary"/>
                        <p:button outcome="/turno/Create" value="Nuevo Turno" styleClass="action-btn action-btn-secondary"/>
                        <p:button outcome="/actividad/Create" value="Nueva Actividad" styleClass="action-btn action-btn-secondary"/>
                    </div>

                    <div class="topbar-user">
                        <button type="button" class="notification-btn" aria-label="Notificaciones">
                            <i class="far fa-bell"></i>
                            <span class="notification-dot"></span>
                        </button>
                        <div class="user-chip">
                            <span class="user-name">#{session.getAttribute('userNombreCompleto')}</span>
                            <span class="user-role">Usuario activo</span>
                        </div>
                    </div>
                </div>
            </p:layoutUnit>

            <p:layoutUnit position="west" id="menuLeft" styleClass="sidebar-container" size="280" resizable="false" closable="false" collapsible="false">
                <h:form styleClass="menuForm">
                    <p:menu styleClass="app-sidebar-menu">
                        <p:submenu label="Principal">
                            <p:menuitem outcome="/agenda/List_AgendasTurnos" value="Dashboard" icon="fa fa-th-large" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/expediente/List" value="Expedientes" icon="fa fa-folder-open" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/consulta/List" value="Consultas" icon="fa fa-comments" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/agenda/List_AgendasTurnos" value="Agendas" icon="fa fa-calendar" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/turno/List" value="Turnos" icon="fa fa-user-clock" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/actividad/Create" value="Actividades" icon="fa fa-tasks" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/estadisticas/List" value="Reportes" icon="fa fa-chart-bar" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/users/List" value="Configuración" icon="fa fa-cog" styleClass="sidebar-link"/>
                        </p:submenu>

                        <p:submenu label="Operación interna">
                            <p:menuitem outcome="/agenda/List_AgendasTurnosWithSession" value="Agendas personales" icon="fa fa-user" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/agenda/List_AgendasTurnosWithSessionOnlyAdminUsers"
                                        rendered="#{empleadoController.isLeader(session.getAttribute('userNombreCompleto')) or session.getAttribute('userNombreCompleto') eq 'Natali D Agostino'}"
                                        value="Agenda de líderes"
                                        icon="fa fa-eye"
                                        styleClass="sidebar-link"/>
                            <p:menuitem outcome="/empleado/List" value="Colaboradores" icon="fa fa-id-card" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/honorario/List" value="Honorarios" icon="fa fa-balance-scale" styleClass="sidebar-link"/>
                            <p:menuitem outcome="/estadoDelTramite/List_EstadoDelTramiteYProcedencias" value="Tipos y estados" icon="fa fa-file-archive" styleClass="sidebar-link"/>
                            <p:menuitem onclick="window.open('https://wa.me/543513220999?text=hola%20necesito%20ayuda%20con%20el%20sistema%20del%20estudio%20Alvarez'); return false;"
                                        value="Soporte"
                                        icon="fa fa-wrench"
                                        styleClass="sidebar-link"/>
                            <p:separator styleClass="sidebar-separator" />
                            <p:menuitem action="#{login.logout()}" value="Cerrar sesión" icon="fa fa-sign-out" styleClass="sidebar-link sidebar-link-logout"/>
                        </p:submenu>
                    </p:menu>
                </h:form>
            </p:layoutUnit>

            <p:layoutUnit position="center" id="fondoCenter" styleClass="content-container">
                <div class="content-wrapper">
                    <div class="page-header saas-card">
                        <h1><ui:insert name="sectionTitle">Panel de gestión jurídica</ui:insert></h1>
                        <p><ui:insert name="sectionSubtitle">Expedientes, consultas, agendas y seguimiento en un único espacio de trabajo.</ui:insert></p>
                    </div>
                    <div class="main-surface saas-card">
                        <ui:insert name="body" />
                    </div>
                </div>
            </p:layoutUnit>
        </p:layout>
    </h:body>

</html>
