<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista previa SaaS</title>
  <link rel="stylesheet" href="resources/css/styles.css" />
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" />
</head>
<body class="saas-app-shell">
  <div class="app-layout">
    <header class="app-topbar">
      <div class="brand-copy"><h1>Estudio Alvarez &amp; Asociados</h1><p>Gestión jurídica integral</p></div>
      <div class="topbar-actions"><button class="btn-primary">Nueva Agenda</button><button class="btn-secondary">Nuevo Turno</button></div>
    </header>
    <aside class="app-sidebar">
      <nav>
        <a class="nav-item" href="#"><i class="far fa-folder-open"></i><span>Expedientes</span></a>
        <a class="nav-item" href="#"><i class="far fa-calendar-alt"></i><span>Agendas</span></a>
      </nav>
    </aside>
    <main class="app-content">
      <section class="content-card">
        <h2 class="section-title">Expedientes</h2>
        <table style="width:100%;border-collapse:collapse;">
          <tr><th align="left">Expediente</th><th align="left">Cliente</th><th align="left">Estado</th></tr>
          <tr style="height:48px;"><td>EXP-1023</td><td>Juan Pérez</td><td><span class="status-badge status-badge--open">Activo</span></td></tr>
          <tr style="height:48px;"><td>EXP-1024</td><td>María Gómez</td><td><span class="status-badge status-badge--pending">Pendiente</span></td></tr>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
