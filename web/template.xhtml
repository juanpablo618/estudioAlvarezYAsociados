<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title><ui:insert name="title">Estudio Alvarez y Asociados</ui:insert></title>
        <h:outputStylesheet library="css" name="jsfcrud.css"/>
        <h:outputStylesheet library="css" name="styles.css"/>
        <h:outputScript library="js" name="jsfcrud.js"/>
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous"></link>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </h:head>

    <h:body class="saas-app-shell">
        <h:form>
            <p:idleMonitor timeout="1800000">
                <p:ajax event="idle" listener="#{login.onIdle}" update=":growl" />
            </p:idleMonitor>
        </h:form>

        <p:growl id="growl" life="5000" showDetail="true" />

        <div class="app-layout">
            <header class="app-topbar">
                <div class="brand-block">
                    <h:graphicImage value="../faces/resources/images/Alvarezyasociados.svg" styleClass="brand-logo"/>
                    <div class="brand-copy">
                        <h1>Estudio Alvarez &amp; Asociados</h1>
                        <p>Gestión jurídica integral</p>
                    </div>
                </div>

                <h:form styleClass="topbar-actions">
                    <p:commandButton value="Nueva Agenda" icon="pi pi-calendar-plus" type="button" styleClass="btn-primary"/>
                    <p:commandButton value="Nuevo Turno" icon="pi pi-clock" type="button" styleClass="btn-secondary"/>
                    <p:commandButton value="Nueva Actividad" icon="pi pi-check-square" type="button" styleClass="btn-secondary"/>

                    <span class="topbar-icon"><i class="far fa-bell"></i></span>
                    <span class="user-pill">
                        <i class="far fa-user-circle"></i>
                        #{session.getAttribute('userNombreCompleto')}
                    </span>
                    <p:commandButton action="#{login.logout()}" value="Salir" icon="pi pi-sign-out" styleClass="btn-ghost"/>
                </h:form>
            </header>

            <aside class="app-sidebar">
                <nav>
                    <h:link outcome="/welcomePrimefaces" styleClass="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></h:link>
                    <h:link outcome="/expediente/List" styleClass="nav-item"><i class="far fa-folder-open"></i><span>Expedientes</span></h:link>
                    <h:link outcome="/consulta/List" styleClass="nav-item"><i class="fas fa-comments"></i><span>Consultas</span></h:link>
                    <h:link outcome="/agenda/List_AgendasTurnos" styleClass="nav-item"><i class="far fa-calendar-alt"></i><span>Agendas</span></h:link>
                    <h:link outcome="/turno/List" styleClass="nav-item"><i class="far fa-clock"></i><span>Turnos</span></h:link>
                    <h:link outcome="/actividad/Create" styleClass="nav-item"><i class="fas fa-tasks"></i><span>Actividades</span></h:link>
                    <h:link outcome="/estadisticas/List" styleClass="nav-item"><i class="fas fa-chart-bar"></i><span>Reportes</span></h:link>
                    <h:link outcome="/estadoDelTramite/List_EstadoDelTramiteYProcedencias" styleClass="nav-item"><i class="fas fa-cogs"></i><span>Configuración</span></h:link>
                </nav>
            </aside>

            <main class="app-content">
                <section class="content-card">
                    <ui:insert name="body" />
                </section>
            </main>
        </div>
    </h:body>

</html>
